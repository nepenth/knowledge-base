site_name: Technical Knowledge Base
site_description: A curated collection of technical knowledge
theme:
  name: material
  features:
  - navigation.instant
  - navigation.tracking
  - navigation.expand
  - navigation.indexes
  - search.highlight
  - search.share
  palette:
    primary: indigo
    accent: indigo
  icon:
    logo: material/library
plugins:
- search
markdown_extensions:
- pymdownx.highlight
- pymdownx.superfences
- pymdownx.tabbed
- pymdownx.details
- admonition
